sql: "SELECT * FROM `bigquery-public-data.baseball.games_wide`  where venueName in (select venueName from ( select avg(pitchSpeed) as speed, venueName from `bigquery-public-data.baseball.games_wide` group by venueName order by speed desc limit 10));"
