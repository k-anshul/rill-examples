title: "trip_data_dashboard"
model: "trip_data_model"
default_time_range: ""
smallest_time_grain: ""
timeseries: "request_datetime"
measures:
  - label: Total records
    expression: count(*)
    name: total_records
    description: Total number of records present
    format_preset: humanize
    valid_percent_of_total: true
dimensions:
  - name: hvfhs_license_num
    label: Hvfhs_license_num
    column: hvfhs_license_num
    description: ""
  - name: dispatching_base_num
    label: Dispatching_base_num
    column: dispatching_base_num
    description: ""
  - name: originating_base_num
    label: Originating_base_num
    column: originating_base_num
    description: ""
  - name: shared_request_flag
    label: Shared_request_flag
    column: shared_request_flag
    description: ""
  - name: shared_match_flag
    label: Shared_match_flag
    column: shared_match_flag
    description: ""
  - name: access_a_ride_flag
    label: Access_a_ride_flag
    column: access_a_ride_flag
    description: ""
  - name: wav_request_flag
    label: Wav_request_flag
    column: wav_request_flag
    description: ""
  - name: wav_match_flag
    label: Wav_match_flag
    column: wav_match_flag
    description: ""
